<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triệu Mạnh Công 12C6</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .profile {
            background: rgba(0,0,0,0.4);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
        }

        p {
            font-size: 14px;
            opacity: 0.9;
        }

        .btn {
            display: block;
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            background: #ff6b6b;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff3b3b;
        }

        footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="profile">

    <!-- Ảnh đại diện -->
    <img src="anh.jpg" class="avatar">

    <!-- Tên -->
    <h1>Triệu Mạnh Công</h1>

    <!-- Mô tả -->
    <p>Học sinh lớp 12C6 | Đam mê thời trang & công nghệ</p>

    <!-- Link -->
    <a href="#" class="btn">Facebook</a>
    <a href="#" class="btn">TikTok</a>
    <a href="#" class="btn">Instagram</a>

    <footer>
        © 2026 Triệu Mạnh Công 12C6
    </footer>

</div>

</body>
</html>
